services:
  mysql-master:
    image: mysql:8.0
    container_name: pulsenet-master
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pulsenet
      MYSQL_USER: pulsenet
      MYSQL_PASSWORD: pulsenet123
      MYSQL_ROOT_HOST: "%"
    command: >
      --server-id=1
      --log-bin=mysql-bin
      --binlog-format=ROW
    ports:
      - "3306:3306"
    volumes:
      - master-data:/var/lib/mysql
    networks:
      - pulsenet-net

  mysql-slave1:
    image: mysql:8.0
    container_name: pulsenet-slave1
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pulsenet
      MYSQL_USER: pulsenet
      MYSQL_PASSWORD: pulsenet123
      MYSQL_ROOT_HOST: "%"
    command: >
      --server-id=2
      --relay-log=relay-log
      --read-only=1
    ports:
      - "3307:3306"
    volumes:
      - slave1-data:/var/lib/mysql
    networks:
      - pulsenet-net
    depends_on:
      - mysql-master

  mysql-slave2:
    image: mysql:8.0
    container_name: pulsenet-slave2
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pulsenet
      MYSQL_USER: pulsenet
      MYSQL_PASSWORD: pulsenet123
      MYSQL_ROOT_HOST: "%"
    command: >
      --server-id=3
      --relay-log=relay-log
      --read-only=1
    ports:
      - "3308:3306"
    volumes:
      - slave2-data:/var/lib/mysql
    networks:
      - pulsenet-net
    depends_on:
      - mysql-master

volumes:
  master-data:
  slave1-data:
  slave2-data:

networks:
  pulsenet-net:
    driver: bridge