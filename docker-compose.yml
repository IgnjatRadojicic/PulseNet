services:
  pulsenet-master:
    image: postgres:16
    container_name: pulsenet-master
    environment:
      POSTGRES_PASSWORD: root
      POSTGRES_DB: pulsenet
      POSTGRES_USER: pulsenet
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5 --auth-local=trust"
    command: >
      postgres
        -c wal_level=replica
        -c max_wal_senders=5
        -c wal_keep_size=128
        -c hot_standby=on
        -c log_replication_commands=on
    volumes:
      - primary-data:/var/lib/postgresql/data
      - ./docker/primary-init.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
      - ./DB_Upiti.sql:/docker-entrypoint-initdb.d/02-schema.sql:ro
    ports:
      - "5435:5432"
    networks:
      - pulsenet-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulsenet -d pulsenet"]
      interval: 5s
      timeout: 5s
      retries: 15

  pulsenet-slave1:
    image: postgres:16
    container_name: pulsenet-slave1
    user: root
    entrypoint: ["/bin/sh", "/docker/replica-entrypoint.sh"]
    environment:
      PGPASSWORD: replicator123
    volumes:
      - slave1-data:/var/lib/postgresql/data
      - ./docker/replica-entrypoint.sh:/docker/replica-entrypoint.sh:ro
    ports:
      - "5433:5432"
    networks:
      - pulsenet-net
    depends_on:
      pulsenet-master:
        condition: service_healthy

  pulsenet-slave2:
    image: postgres:16
    container_name: pulsenet-slave2
    user: root
    entrypoint: ["/bin/sh", "/docker/replica-entrypoint.sh"]
    environment:
      PGPASSWORD: replicator123
    volumes:
      - slave2-data:/var/lib/postgresql/data
      - ./docker/replica-entrypoint.sh:/docker/replica-entrypoint.sh:ro
    ports:
      - "5434:5432"
    networks:
      - pulsenet-net
    depends_on:
      pulsenet-master:
        condition: service_healthy

volumes:
  primary-data:
  slave1-data:
  slave2-data:

networks:
  pulsenet-net:
    driver: bridge
